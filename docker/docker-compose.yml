version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: bondhon_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: bondhon
    volumes:
      - bondhon_mongo_data:/data/db

volumes:
  bondhon_mongo_data:
    driver: local
